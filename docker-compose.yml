services:
  # Main Application
  ielts_training_app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: ielts_training_app:latest
    container_name: ielts_training_app
    network_mode: host
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRED: ${JWT_ACCESS_TOKEN_EXPIRED}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TOKEN_EXPIRED: ${JWT_REFRESH_TOKEN_EXPIRED}
      MAILER_USER: ${MAILER_USER}
      MAILER_PASSWORD: ${MAILER_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALL_BACK_URL: ${GOOGLE_CALL_BACK_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      AI_MICROSERVICE_SECRET: ${AI_MICROSERVICE_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - ielts_network
    ports:
      - '6380:6379'
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    networks:
      - ielts_network
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # AI Workers (all use shared ai-workers/.env)
  ai-grading-worker:
    build:
      context: .
      dockerfile: ./ai-workers/grading-worker/Dockerfile
      network: host
    image: ai-grading-worker:latest
    container_name: ai-grading-worker
    networks:
      - ielts_network
    env_file:
      - ./ai-workers/.env
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ai-chatbot-worker:
    build:
      context: ./ai-workers
      dockerfile: ./chatbot-worker/Dockerfile
      network: host
    image: ai-chatbot-worker:latest
    container_name: ai-chatbot-worker
    networks:
      - ielts_network
    env_file:
      - ./ai-workers/.env
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ai-embedding-worker:
    build:
      context: ./ai-workers
      dockerfile: ./embedding-worker/Dockerfile
      network: host
    image: ai-embedding-worker:latest
    container_name: ai-embedding-worker
    networks:
      - ielts_network
    env_file:
      - ./ai-workers/.env
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

networks:
  ielts_network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
